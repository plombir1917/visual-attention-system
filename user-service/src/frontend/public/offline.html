<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Нет соединения — ФОКУС</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: radial-gradient(circle at 20% 10%, rgba(37,99,235,.18), transparent 55%),
                radial-gradient(circle at 90% 90%, rgba(139,92,246,.14), transparent 55%),
                linear-gradient(180deg, #0b0e1a 0%, #131a33 100%);
    color: #fff; text-align: center; padding: 24px;
  }
  .card { max-width: 460px; }
  .brand { font-size: 56px; font-weight: 900; letter-spacing: -.04em; margin: 0 0 12px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 10px; }
  p { color: #aab3d0; font-size: 16px; line-height: 1.6; margin: 0 0 28px; }
  button {
    appearance: none; border: 0; cursor: pointer;
    background: #2563eb; color: #fff; font-size: 16px; font-weight: 600;
    padding: 14px 28px; border-radius: 999px; transition: opacity .2s;
  }
  button:hover { opacity: .9; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">ФОКУС</div>
    <h1>Нет соединения с интернетом</h1>
    <p>Похоже, вы офлайн. Проверьте подключение — и попробуйте снова.</p>
    <button onclick="location.reload()">Повторить</button>
  </div>
</body>
</html>
