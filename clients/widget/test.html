<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>VAS Widget — тест</title>
  <style>
    body { font-family: system-ui; padding: 40px; background: #f1f5f9; color: #0b0e1a; }
    h1 { margin-bottom: 8px; }
    p { color: #64748b; }
  </style>
</head>
<body>
  <h1>Тест страница</h1>
  <p>Виджет VAS Attention появится в правом нижнем углу.</p>
  <p>Запустите: <code>npx serve .</code> из папки <code>clients/widget/</code></p>

  <script type="module">
    import { mountVasWidget } from './dist/vas-widget.js'

    mountVasWidget({
      // apiKey: 'vas_live_xxx.xxx',  // раскомментируйте для пропуска формы
      position: 'bottom-right',
      theme: 'auto',
    })
  </script>
</body>
</html>
