appId: com.vas.desktop
productName: ФОКУС
copyright: Copyright © 2025 ФОКУС

directories:
  buildResources: resources
  output: release

files:
  - out/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  artifactName: ФОКУС.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ФОКУС
