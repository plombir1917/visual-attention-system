appId: com.vas.desktop
productName: ФОКУС
copyright: Copyright © 2025 ФОКУС

directories:
  buildResources: resources
  output: release

files:
  - out/**/*
  - resources/icon.ico
  - resources/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  artifactName: ФОКУС.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ФОКУС

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Utility
  synopsis: Desktop client for the FOCUS attention system
  maintainer: ФОКУС <zacopich@gmail.com>
  artifactName: ФОКУС.${ext}
