appId: com.vas.desktop
productName: ФОКУС
copyright: Copyright © 2026 ФОКУС

directories:
  buildResources: resources
  output: release

files:
  - out/**/*
  - resources/icon.ico
  - resources/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  # Латиница в имени: кириллица в имени .exe усиливает подозрительность части
  # антивирусов и ломает ссылку/Content-Disposition при раздаче. Отображаемое
  # имя приложения (productName: ФОКУС) при этом остаётся прежним.
  artifactName: FOCUS-Setup.${ext}
  # Имя компании/издателя в свойствах файла (version-info).
  legalTrademarks: ФОКУС

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ФОКУС

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Utility
  synopsis: Desktop client for the FOCUS attention system
  maintainer: ФОКУС <zacopich@gmail.com>
  artifactName: FOCUS.${ext}
